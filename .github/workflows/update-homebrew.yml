name: Update Homebrew Formula

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-homebrew:
    name: Bump Homebrew Tap Formula
    runs-on: ubuntu-latest
    if: "!github.event.release.prerelease"
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          curl -fsSL -o checksums.txt \
            "https://github.com/DaoFlow-dev/DaoFlow/releases/download/${{ github.ref_name }}/checksums.txt"
          cat checksums.txt

      - name: Extract SHA256 values
        id: sha
        run: |
          echo "darwin_arm64=$(grep 'daoflow-darwin-arm64.tar.gz' checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "darwin_x64=$(grep 'daoflow-darwin-x64.tar.gz' checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(grep 'daoflow-linux-arm64.tar.gz' checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(grep 'daoflow-linux-x64.tar.gz' checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: DaoFlow-dev/homebrew-daoflow
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/daoflow.rb << 'FORMULA'
          # typed: false
          # frozen_string_literal: true

          class Daoflow < Formula
            desc "Self-hosted deployment platform — Docker Compose made production-ready"
            homepage "https://daoflow.dev"
            version "${{ steps.version.outputs.version }}"
            license "AGPL-3.0-only"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/DaoFlow-dev/DaoFlow/releases/download/v#{version}/daoflow-darwin-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_arm64 }}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/DaoFlow-dev/DaoFlow/releases/download/v#{version}/daoflow-darwin-x64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin_x64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/DaoFlow-dev/DaoFlow/releases/download/v#{version}/daoflow-linux-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/DaoFlow-dev/DaoFlow/releases/download/v#{version}/daoflow-linux-x64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x64 }}"
              end
            end

            def install
              bin.install "daoflow"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/daoflow --cli-version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/daoflow.rb
          git commit -m "daoflow ${{ steps.version.outputs.version }}"
          git push
