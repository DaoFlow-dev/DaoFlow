name: Release CLI

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build CLI Binaries & Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update CLI package version
        run: |
          cd packages/cli
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json > tmp.json
          mv tmp.json package.json

      # Use baseline to avoid AVX2 — ensures compatibility with all x86_64 CPUs
      - name: Build linux-x64
        run: bun build packages/cli/src/index.ts --compile --target=bun-linux-x64-baseline --outfile dist/daoflow-linux-x64

      - name: Build linux-arm64
        run: bun build packages/cli/src/index.ts --compile --target=bun-linux-arm64 --outfile dist/daoflow-linux-arm64

      - name: Build darwin-arm64 (Apple Silicon)
        run: bun build packages/cli/src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/daoflow-darwin-arm64

      - name: Build darwin-x64 (Intel Mac)
        run: bun build packages/cli/src/index.ts --compile --target=bun-darwin-x64 --outfile dist/daoflow-darwin-x64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum daoflow-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DaoFlow CLI v${{ steps.version.outputs.version }}
          body: |
            ## DaoFlow CLI v${{ steps.version.outputs.version }}

            ### Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/DaoFlow-dev/DaoFlow/main/scripts/install.sh | sh
            ```

            Or download a binary directly:

            | Platform | Architecture | Binary |
            |----------|-------------|--------|
            | Linux | x64 | `daoflow-linux-x64` |
            | Linux | arm64 | `daoflow-linux-arm64` |
            | macOS | Apple Silicon | `daoflow-darwin-arm64` |
            | macOS | Intel | `daoflow-darwin-x64` |

            ### Manual Install

            ```bash
            # Download (example: macOS Apple Silicon)
            curl -fsSL -o daoflow https://github.com/DaoFlow-dev/DaoFlow/releases/download/v${{ steps.version.outputs.version }}/daoflow-darwin-arm64
            chmod +x daoflow
            sudo mv daoflow /usr/local/bin/
            ```
          draft: false
          prerelease: false
          files: |
            dist/daoflow-linux-x64
            dist/daoflow-linux-arm64
            dist/daoflow-darwin-arm64
            dist/daoflow-darwin-x64
            dist/checksums.txt
          generate_release_notes: true
