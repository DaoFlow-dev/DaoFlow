name: Real infrastructure harness

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read

concurrency:
  group: daoflow-real-infrastructure
  cancel-in-progress: false

jobs:
  real-infrastructure:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: real-infrastructure
    env:
      DAOFLOW_REAL_INFRA_SSH_HOST: ${{ secrets.DAOFLOW_REAL_INFRA_SSH_HOST }}
      DAOFLOW_REAL_INFRA_SSH_PORT: ${{ secrets.DAOFLOW_REAL_INFRA_SSH_PORT }}
      DAOFLOW_REAL_INFRA_SSH_USER: ${{ secrets.DAOFLOW_REAL_INFRA_SSH_USER }}
      DAOFLOW_REAL_INFRA_SSH_PRIVATE_KEY: ${{ secrets.DAOFLOW_REAL_INFRA_SSH_PRIVATE_KEY }}
      DAOFLOW_REAL_INFRA_SSH_HOST_KEY: ${{ secrets.DAOFLOW_REAL_INFRA_SSH_HOST_KEY }}
      DAOFLOW_REAL_INFRA_REMOTE_MARKER_PATH: ${{ secrets.DAOFLOW_REAL_INFRA_REMOTE_MARKER_PATH }}
      DAOFLOW_REAL_INFRA_REMOTE_MARKER_NONCE: ${{ secrets.DAOFLOW_REAL_INFRA_REMOTE_MARKER_NONCE }}

    steps:
      - name: Check target secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            DAOFLOW_REAL_INFRA_SSH_HOST \
            DAOFLOW_REAL_INFRA_SSH_PORT \
            DAOFLOW_REAL_INFRA_SSH_USER \
            DAOFLOW_REAL_INFRA_SSH_PRIVATE_KEY \
            DAOFLOW_REAL_INFRA_SSH_HOST_KEY \
            DAOFLOW_REAL_INFRA_REMOTE_MARKER_PATH \
            DAOFLOW_REAL_INFRA_REMOTE_MARKER_NONCE; do
            if [[ -z "${!name:-}" ]]; then missing+=("$name"); fi
          done
          if (( ${#missing[@]} )); then
            echo "::error::Real-infrastructure target secrets are unavailable: ${missing[*]}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: timeout 600 bun install --frozen-lockfile

      - name: Install browser and rclone
        run: |
          timeout 600 bunx playwright install --with-deps chromium
          timeout 600 sudo apt-get update
          timeout 600 sudo apt-get install --yes rclone

      - name: Run opt-in real-infrastructure harness
        shell: bash
        run: |
          set -euo pipefail
          export DAOFLOW_REAL_INFRA=1
          export DAOFLOW_REAL_INFRA_RUN_TOKEN="ri$(openssl rand -hex 10)"
          export DAOFLOW_REAL_INFRA_ARTIFACT_DIR="$GITHUB_WORKSPACE/test-results/real-infra"
          export DAOFLOW_REAL_INFRA_WORKSPACE_ROOT="/tmp/daoflow-real-infra/$DAOFLOW_REAL_INFRA_RUN_TOKEN"

          db_name="daoflow_real_infra_${DAOFLOW_REAL_INFRA_RUN_TOKEN}"
          db_user="ri$(openssl rand -hex 10)"
          db_password="$(openssl rand -hex 24)"
          minio_access_key="$(openssl rand -hex 16)"
          minio_secret_key="$(openssl rand -hex 24)"
          export PLAYWRIGHT_REAL_INFRA_DATABASE_URL="postgresql://${db_user}:${db_password}@127.0.0.1:55432/${db_name}"
          export REDIS_URL="redis://127.0.0.1:56379"
          export BETTER_AUTH_SECRET="$(openssl rand -hex 32)"
          export ENCRYPTION_KEY="$(openssl rand -hex 32)"
          export DAOFLOW_BACKUP_DESTINATION_ENCRYPTION_KEY="$(openssl rand -hex 32)"
          export TEMPORAL_ADDRESS="127.0.0.1:57233"
          export TEMPORAL_NAMESPACE="daoflow"
          export DAOFLOW_REAL_INFRA_S3_ENDPOINT="http://127.0.0.1:59000"
          export DAOFLOW_REAL_INFRA_S3_BUCKET="realinfra"
          export DAOFLOW_REAL_INFRA_S3_ACCESS_KEY="$minio_access_key"
          export DAOFLOW_REAL_INFRA_S3_SECRET_ACCESS_KEY="$minio_secret_key"
          export DAOFLOW_REAL_INFRA_S3_REGION="us-east-1"

          timeout 600 docker run -d --rm --name daoflow-real-infra-postgres \
            -e POSTGRES_DB="$db_name" -e POSTGRES_USER="$db_user" -e POSTGRES_PASSWORD="$db_password" \
            -p 55432:5432 pgvector/pgvector:pg17 >/dev/null
          timeout 600 docker run -d --rm --name daoflow-real-infra-redis \
            -p 56379:6379 redis:7-alpine >/dev/null
          timeout 600 docker run -d --rm --name daoflow-real-infra-temporal \
            -p 57233:7233 temporalio/temporal server start-dev --ip 0.0.0.0 --namespace daoflow >/dev/null
          timeout 600 docker run -d --rm --name daoflow-real-infra-minio \
            -e MINIO_ROOT_USER="$minio_access_key" -e MINIO_ROOT_PASSWORD="$minio_secret_key" \
            -p 59000:9000 minio/minio server /data >/dev/null

          timeout 300 bash -c 'until docker exec daoflow-real-infra-postgres pg_isready -U "$0" >/dev/null 2>&1; do sleep 1; done' "$db_user"
          timeout 300 bash -c 'until (echo > /dev/tcp/127.0.0.1/57233) >/dev/null 2>&1; do sleep 1; done'
          timeout 300 bash -c 'until (echo > /dev/tcp/127.0.0.1/59000) >/dev/null 2>&1; do sleep 1; done'
          RCLONE_CONFIG_RI_TYPE=s3 \
            RCLONE_CONFIG_RI_PROVIDER=Minio \
            RCLONE_CONFIG_RI_ACCESS_KEY_ID="$DAOFLOW_REAL_INFRA_S3_ACCESS_KEY" \
            RCLONE_CONFIG_RI_SECRET_ACCESS_KEY="$DAOFLOW_REAL_INFRA_S3_SECRET_ACCESS_KEY" \
            RCLONE_CONFIG_RI_ENDPOINT="$DAOFLOW_REAL_INFRA_S3_ENDPOINT" \
            RCLONE_CONFIG_RI_REGION="$DAOFLOW_REAL_INFRA_S3_REGION" \
            RCLONE_CONFIG_RI_FORCE_PATH_STYLE=true \
            timeout 300 rclone mkdir "ri:${DAOFLOW_REAL_INFRA_S3_BUCKET}" >/dev/null

          bun run test:e2e:real-infra

      - name: Stop real-infrastructure support services
        if: always()
        shell: bash
        run: |
          timeout 300 docker rm -f \
            daoflow-real-infra-postgres \
            daoflow-real-infra-redis \
            daoflow-real-infra-temporal \
            daoflow-real-infra-minio >/dev/null 2>&1 || true

      - name: Upload redacted harness artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: real-infrastructure-artifacts
          path: test-results/real-infra
          if-no-files-found: warn
