name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: daoflow-dev/daoflow

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: daoflow_smoke
          POSTGRES_USER: daoflow
          POSTGRES_PASSWORD: daoflow_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daoflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime image for smoke test
        run: docker build --target runtime --tag daoflow-smoke:${{ github.sha }} .

      - name: Smoke-test runtime image
        run: sh ./scripts/smoke-production-image.sh daoflow-smoke:${{ github.sha }}
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_dev@host.docker.internal:5432/daoflow_smoke
          BETTER_AUTH_SECRET: daoflow-ci-smoke-secret-with-enough-entropy-2026
          ENCRYPTION_KEY: daoflow-ci-smoke-encryption-key-32chars00

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
