name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: daoflow-dev/daoflow
  CODEX_RUNNER_IMAGE_NAME: daoflow-dev/codex-runner
  DOCKERHUB_IMAGE_NAME: daoflow/daoflow

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: daoflow_smoke
          POSTGRES_USER: daoflow
          POSTGRES_PASSWORD: daoflow_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daoflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime image for smoke test
        run: docker build --target runtime --tag daoflow-smoke:${{ github.sha }} .

      - name: Smoke-test runtime image
        run: sh ./scripts/smoke-production-image.sh daoflow-smoke:${{ github.sha }}
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_dev@host.docker.internal:5432/daoflow_smoke
          BETTER_AUTH_SECRET: daoflow-ci-smoke-secret-with-enough-entropy-2026
          ENCRYPTION_KEY: daoflow-ci-smoke-encryption-key-32chars00

      - name: Resolve previous main commit
        id: previous-main
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            previous_ref="$PR_BASE_SHA"
          elif [[ "$EVENT_BEFORE" =~ ^[0-9a-fA-F]{40}$ ]] &&
            [[ ! "$EVENT_BEFORE" =~ ^0+$ ]] &&
            git cat-file -e "${EVENT_BEFORE}^{commit}" 2>/dev/null; then
            previous_ref="$EVENT_BEFORE"
          else
            previous_ref="$(git rev-parse "${HEAD_SHA}^")"
          fi

          [[ "$previous_ref" =~ ^[0-9a-fA-F]{40}$ ]] || {
            echo "Could not resolve a full previous-main commit SHA." >&2
            exit 1
          }
          git cat-file -e "${previous_ref}^{commit}"
          echo "ref=$previous_ref" >> "$GITHUB_OUTPUT"

      - name: Test previous-main image upgrade
        shell: bash
        env:
          PREVIOUS_REF: ${{ steps.previous-main.outputs.ref }}
          DAOFLOW_UPGRADE_ADMIN_DATABASE_URL: postgresql://daoflow:daoflow_dev@127.0.0.1:5432/daoflow_smoke
        run: ./scripts/test-upgrade-image.sh "$PREVIOUS_REF" "daoflow-smoke:${{ github.sha }}"

      - name: Build Codex runner image for smoke test
        run: docker build --target codex-runner --tag codex-runner-smoke:${{ github.sha }} .

      - name: Smoke-test Codex runner image
        run: docker run --rm codex-runner-smoke:${{ github.sha }} sh -lc 'codex --version && bun --version && git --version'

      - name: Detect Codex runner publish need
        id: codex-runner-publish
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          publish=false

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            publish=true
          elif ! changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- Dockerfile)"; then
            publish=true
          elif grep -q '^Dockerfile$' <<< "$changed_files"; then
            publish=true
          fi

          echo "publish=${publish}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Codex runner metadata
        id: codex-runner-meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.CODEX_RUNNER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Codex runner
        if: github.event_name == 'pull_request' || steps.codex-runner-publish.outputs.publish == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: codex-runner
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.codex-runner-meta.outputs.tags }}
          labels: ${{ steps.codex-runner-meta.outputs.labels }}
          cache-from: type=gha,scope=codex-runner
          cache-to: type=gha,mode=max,scope=codex-runner
          platforms: linux/amd64,linux/arm64

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: daoflow
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime
          platforms: linux/amd64,linux/arm64
