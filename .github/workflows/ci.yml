name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-typecheck:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  e2e:
    name: E2E Tests (Docker Compose)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: daoflow_test
          POSTGRES_USER: daoflow
          POSTGRES_PASSWORD: daoflow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daoflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_ci@localhost:5432/daoflow_test

      - name: Push DB schema
        run: bun run db:push:ci
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_ci@localhost:5432/daoflow_test

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_ci@localhost:5432/daoflow_test
          REDIS_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: daoflow-ci-secret-long-enough-2026
          BETTER_AUTH_URL: http://127.0.0.1:3000
          ENCRYPTION_KEY: daoflow-ci-encryption-key-32chars00
          NODE_ENV: production
          DISABLE_WORKER: "true"
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
