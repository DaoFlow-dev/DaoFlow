name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-typecheck:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Check agent instructions and skills
        run: bun run skills:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: daoflow
          POSTGRES_USER: daoflow
          POSTGRES_PASSWORD: daoflow_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daoflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://daoflow:daoflow_dev@127.0.0.1:5432/daoflow
      TEST_DATABASE_URL: postgresql://daoflow:daoflow_dev@127.0.0.1:5432/daoflow_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

  cli-build-verify:
    name: CLI Build Verification (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            script: build:linux
            output: dist/daoflow-linux-x64
          - name: linux-arm64
            script: build:linux-arm64
            output: dist/daoflow-linux-arm64
          - name: darwin-arm64
            script: build:mac
            output: dist/daoflow-darwin-arm64
          - name: darwin-x64
            script: build:mac-x64
            output: dist/daoflow-darwin-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile CLI binary
        working-directory: packages/cli
        run: |
          bun run ${{ matrix.script }}
          test -s ${{ matrix.output }}

      - name: Smoke-test CLI binary
        if: matrix.name == 'linux-x64'
        working-directory: packages/cli
        run: ./${{ matrix.output }} --version

  e2e:
    name: E2E Tests (Docker Compose)
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start dev Compose stack
        run: sh ./scripts/ensure-dev-compose.sh

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_dev@localhost:5432/daoflow_e2e

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          set -euxo pipefail
          bun run test:e2e 2>&1 | tee e2e-ci.log
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_dev@localhost:5432/daoflow_e2e
          PLAYWRIGHT_DATABASE_URL: postgresql://daoflow:daoflow_dev@localhost:5432/daoflow_e2e
          PLAYWRIGHT_BOOTSTRAP_DATABASE_URL: postgresql://daoflow:daoflow_dev@localhost:5432/daoflow_e2e_bootstrap
          REDIS_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: daoflow-ci-secret-long-enough-2026
          BETTER_AUTH_URL: http://127.0.0.1:3000
          ENCRYPTION_KEY: daoflow-ci-encryption-key-32chars00
          NODE_ENV: production
          DISABLE_WORKER: "true"
          CI: true

      - name: Stop dev Compose stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload E2E debug log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-ci-log
          path: e2e-ci.log
          if-no-files-found: ignore

  e2e-worker:
    name: E2E Tests (Worker + Temporal)
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start dev Compose stack
        run: sh ./scripts/ensure-dev-compose.sh

      - name: Start Temporal dev server
        run: |
          docker run -d --name daoflow-temporal-dev \
            -p 7233:7233 -p 8233:8233 \
            temporalio/temporal server start-dev \
            --ip 0.0.0.0 --namespace daoflow
          timeout 30 bash -c 'until (echo > /dev/tcp/127.0.0.1/7233) >/dev/null 2>&1; do sleep 1; done'
          echo "Temporal dev server started"

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_dev@localhost:5432/daoflow_e2e_worker

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run worker E2E tests
        run: |
          set -euxo pipefail
          bun run test:e2e:worker 2>&1 | tee e2e-worker-ci.log
        env:
          DATABASE_URL: postgresql://daoflow:daoflow_dev@localhost:5432/daoflow_e2e_worker
          PLAYWRIGHT_WORKER_DATABASE_URL: postgresql://daoflow:daoflow_dev@localhost:5432/daoflow_e2e_worker
          REDIS_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: daoflow-ci-worker-secret-2026
          BETTER_AUTH_URL: http://127.0.0.1:3000
          ENCRYPTION_KEY: daoflow-ci-encryption-key-32chars00
          TEMPORAL_ADDRESS: localhost:7233
          TEMPORAL_NAMESPACE: daoflow
          DAOFLOW_ENABLE_TEMPORAL: "true"
          NODE_ENV: production

      - name: Stop dev Compose stack
        if: always()
        run: |
          docker rm -f daoflow-temporal-dev || true
          docker compose -f docker-compose.dev.yml down -v

      - name: Upload worker E2E report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-worker-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload worker E2E debug log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-worker-ci-log
          path: e2e-worker-ci.log
          if-no-files-found: ignore
