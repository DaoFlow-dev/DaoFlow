# docker-compose.yml — Production deployment stack
# Usage: docker compose up -d
#
# This runs the complete DaoFlow control plane from pre-built
# GitHub Container Registry images. Used for self-hosted production
# deployments on bare metal and VPS environments.

services:
  daoflow:
    image: ghcr.io/daoflow-dev/daoflow:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - daoflow-staging:/app/staging
      - daoflow-ssh:/app/.ssh
    environment:
      DATABASE_URL: postgresql://daoflow:${POSTGRES_PASSWORD:-daoflow_prod}@postgres:5432/daoflow
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
      NODE_ENV: production
      GIT_WORK_DIR: /app/staging
      SSH_KEY_DIR: /app/.ssh
      DEPLOY_TIMEOUT_MS: ${DEPLOY_TIMEOUT_MS:-600000}
      # Temporal (optional):
      # TEMPORAL_ADDRESS: temporal:7233
      # TEMPORAL_NAMESPACE: daoflow
      # TEMPORAL_TASK_QUEUE: daoflow-deployments
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: daoflow
      POSTGRES_USER: daoflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daoflow_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daoflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  daoflow-staging:
  daoflow-ssh:
