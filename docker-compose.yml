# docker-compose.yml — Production deployment stack
# Usage: docker compose up -d
#
# All secrets and passwords are sourced from .env file.
# Run `daoflow install` to auto-generate a secure .env file,
# or copy .env.example and fill in values manually.
#
# This runs the complete DaoFlow control plane from pre-built
# GitHub Container Registry images.

services:
  daoflow:
    image: ghcr.io/daoflow-dev/daoflow:${DAOFLOW_VERSION:-0.10.0}
    restart: unless-stopped
    ports:
      - "${DAOFLOW_BIND:-127.0.0.1}:${DAOFLOW_PORT:-3000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - daoflow-staging:/app/staging
      - daoflow-ssh:/app/.ssh
    environment:
      DATABASE_URL: postgresql://daoflow:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${DAOFLOW_DATABASE_NAME:-daoflow}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
      DAOFLOW_BACKUP_DESTINATION_ENCRYPTION_KEY: ${DAOFLOW_BACKUP_DESTINATION_ENCRYPTION_KEY:-}
      DAOFLOW_PREVIOUS_BACKUP_DESTINATION_ENCRYPTION_KEY: ${DAOFLOW_PREVIOUS_BACKUP_DESTINATION_ENCRYPTION_KEY:-}
      DAOFLOW_RECOVERY_ENCRYPTION_KEY: ${DAOFLOW_RECOVERY_ENCRYPTION_KEY:-}
      DAOFLOW_PREVIOUS_RECOVERY_ENCRYPTION_KEY: ${DAOFLOW_PREVIOUS_RECOVERY_ENCRYPTION_KEY:-}
      DAOFLOW_RECOVERY_KEY_ROTATED_AT: ${DAOFLOW_RECOVERY_KEY_ROTATED_AT:-}
      DAOFLOW_CONTROL_PLANE_POSTGRES_CONTAINER: ${DAOFLOW_CONTROL_PLANE_POSTGRES_CONTAINER:-}
      DAOFLOW_RCLONE_COMMAND_TIMEOUT_MS: ${DAOFLOW_RCLONE_COMMAND_TIMEOUT_MS:-1800000}
      DAOFLOW_CONTROL_PLANE_RECOVERY_VERIFIER_STORAGE_MB: ${DAOFLOW_CONTROL_PLANE_RECOVERY_VERIFIER_STORAGE_MB:-4096}
      DAOFLOW_INITIAL_ADMIN_EMAIL: ${DAOFLOW_INITIAL_ADMIN_EMAIL:-}
      DAOFLOW_INITIAL_ADMIN_PASSWORD: ${DAOFLOW_INITIAL_ADMIN_PASSWORD:-}
      NODE_ENV: production
      GIT_WORK_DIR: /app/staging
      SSH_KEY_DIR: /app/.ssh
      DEPLOY_TIMEOUT_MS: ${DEPLOY_TIMEOUT_MS:-86400000}
      DAOFLOW_ENABLE_TEMPORAL: ${DAOFLOW_ENABLE_TEMPORAL:-false}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-daoflow}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-daoflow-deployments}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://127.0.0.1:3000/ready'').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"'
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: daoflow
      POSTGRES_USER: daoflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daoflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Temporal Stack ─────────────────────────────────────────
  temporal-postgresql:
    image: postgres:15-alpine
    restart: unless-stopped
    profiles:
      - temporal
      - temporal-ui
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD-}
    volumes:
      - temporal-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.29.6
    restart: unless-stopped
    profiles:
      - temporal
      - temporal-ui
    expose:
      - "7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD-}
      - POSTGRES_SEEDS=temporal-postgresql
      - DEFAULT_NAMESPACE=${TEMPORAL_NAMESPACE:-daoflow}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    depends_on:
      temporal-postgresql:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.49.1
    restart: unless-stopped
    profiles:
      - temporal-ui
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT:-8233}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=${BETTER_AUTH_URL:-http://localhost:3000}
    depends_on:
      - temporal

volumes:
  pgdata:
  redisdata:
  daoflow-staging:
  daoflow-ssh:
  temporal-pgdata:
