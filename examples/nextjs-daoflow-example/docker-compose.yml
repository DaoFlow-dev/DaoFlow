# Example app deployment via DaoFlow
# This compose file is what DaoFlow deploys to the target server.

services:
  nextjs-example:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
