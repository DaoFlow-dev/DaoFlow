# Docker Compose for local context deployment via DaoFlow.
# When deployed with `daoflow deploy --compose ./compose.yaml`,
# DaoFlow detects `build.context: .` and bundles the local directory.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
