# docker-compose.dev.yml — Local development stack
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# Spins up the persistence layer DaoFlow needs for local development:
# Postgres (app DB) and Redis (job queue + SSE).
#
# Temporal runs natively via the Temporal CLI instead of Docker:
#   temporal server start-dev --port 7233 --ui-port 8233 --namespace daoflow
#
# Or use the shortcut: bun run dev:temporal
#
# The DaoFlow server itself runs via `bun run dev` on the host.

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: daoflow
      POSTGRES_USER: daoflow
      POSTGRES_PASSWORD: daoflow_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daoflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
